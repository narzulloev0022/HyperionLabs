<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Hyperion Labs</title>
    <meta name="description" content="This page doesn't exist. Head back to Hyperion Labs — world-class AI for healthcare in Central Asia." />
    <meta name="robots" content="noindex" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=1" />
    <link rel="preload" href="/assets/fonts/Inter-400-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/assets/fonts/SpaceGrotesk-700-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/style.css?v=13" />
    <style>
      /* 404-only layout — built on style.css tokens */
      .nf-main {
        position: relative;
        min-height: calc(100dvh - 92px);
        display: flex;
        align-items: center;
        background: var(--bg-deep);
        overflow: hidden;
        padding: 48px 0 72px;
      }
      /* ghost number behind content */
      .nf-ghost {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -54%);
        z-index: 0;
        font-family: var(--font-display);
        font-size: clamp(14rem, 42vw, 30rem);
        font-weight: 700;
        letter-spacing: -.04em;
        line-height: 1;
        color: transparent;
        -webkit-text-stroke: 1px rgba(149, 174, 248, .13);
        pointer-events: none;
        user-select: none;
      }
      .nf-inner {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: 100%;
      }
      .nf-glyph {
        width: 92px;
        height: 92px;
        margin-bottom: 28px;
        filter: drop-shadow(0 0 16px var(--glow-soft));
      }
      .nf-glyph .ring { fill: none; stroke: var(--glow); stroke-width: 1; }
      .nf-glyph .node { fill: var(--glow); }
      .nf-glyph .ring-spin {
        transform-box: fill-box;
        transform-origin: center;
        animation: teaserSpin 38s linear infinite;
      }
      .nf-glyph .node {
        transform-box: fill-box;
        transform-origin: center;
        animation: pulse 3s ease-in-out infinite;
      }
      .nf-title { max-width: 16ch; }
      .nf-lead { margin-inline: auto; }
      .nf-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
        margin-top: 34px;
      }
      .nf-code {
        margin-top: 40px;
        font-size: .82rem;
        letter-spacing: .14em;
        text-transform: uppercase;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <!-- Living atmosphere — same fixed gradient layer as the main page -->
    <div class="bg-field" aria-hidden="true"></div>

    <div class="site-shell">
      <!-- ═══ HEADER (minimal) ═══ -->
      <header class="site-header">
        <div class="container">
          <nav class="nav" aria-label="Primary navigation">
            <a class="logo" href="/" aria-label="Hyperion Labs home">
              <img class="logo-mark" src="/assets/logo/hyperion-mark.svg" alt="" width="26" height="26" />
              <span class="logo-text">HYPERION LABS</span>
            </a>
            <div class="nav-actions">
              <a class="btn btn-primary nav-cta-desktop" style="display:inline-flex" href="/" data-i18n="nfHome">Back to home</a>
            </div>
          </nav>
        </div>
      </header>

      <!-- ═══ MAIN ═══ -->
      <main class="nf-main" id="main">
        <div class="hero-fx" aria-hidden="true">
          <div class="hero-nebula"></div>
          <i class="stars stars-a"></i>
          <i class="stars stars-b"></i>
        </div>
        <div class="nf-ghost" aria-hidden="true">404</div>
        <div class="container">
          <div class="nf-inner">
            <svg class="nf-glyph" viewBox="0 0 120 120" aria-hidden="true">
              <circle class="ring ring-spin" cx="60" cy="60" r="42" stroke-dasharray="2 9" opacity=".5" />
              <circle class="ring" cx="60" cy="60" r="27" opacity=".3" />
              <circle class="node" cx="60" cy="60" r="5" opacity=".8" />
            </svg>
            <div class="hero-badge hero-anim">
              <span class="dot"></span>
              <span data-i18n="nfEyebrow">404 · Page not found</span>
            </div>
            <h1 class="hero-title hero-anim hero-d1 nf-title">
              <span data-i18n="nfTitle1">Lost in </span><span class="accent" data-i18n="nfTitle2">deep space.</span>
            </h1>
            <p class="lead hero-anim hero-d2 nf-lead" data-i18n="nfLead">
              This page doesn't exist — but everything important is still in place.
            </p>
            <div class="nf-actions hero-anim hero-d3">
              <a class="btn btn-primary btn-lg" href="/" data-i18n="nfHome">Back to home</a>
              <a class="btn btn-secondary btn-lg" href="/#avris" data-i18n="nfAvris">Explore AvrisAI</a>
            </div>
            <p class="nf-code hero-anim hero-d3">HTTP 404 · hyperion-labs.ai</p>
          </div>
        </div>
      </main>

      <!-- ═══ FOOTER (slim) ═══ -->
      <footer>
        <div class="container">
          <div class="footer-meta" style="margin-top:0;padding-top:0;border-top:none">&copy; 2026 Hyperion Labs. All rights reserved.</div>
        </div>
      </footer>
    </div>

    <script>
      // Standalone i18n — mirrors the language stored by the main page.
      (function () {
        var dict = {
          en: {
            nfEyebrow: "404 · Page not found",
            nfTitle1: "Lost in ",
            nfTitle2: "deep space.",
            nfLead: "This page doesn't exist — but everything important is still in place.",
            nfHome: "Back to home",
            nfAvris: "Explore AvrisAI",
          },
          ru: {
            nfEyebrow: "404 · Страница не найдена",
            nfTitle1: "Потерялись в ",
            nfTitle2: "глубоком космосе.",
            nfLead: "Такой страницы нет — но всё главное на месте.",
            nfHome: "На главную",
            nfAvris: "Открыть AvrisAI",
          },
          tg: {
            nfEyebrow: "404 · Саҳифа ёфт нашуд",
            nfTitle1: "Дар ",
            nfTitle2: "кайҳон гум шудем.",
            nfLead: "Чунин саҳифа вуҷуд надорад — аммо ҳама чизи муҳим дар ҷояш аст.",
            nfHome: "Ба саҳифаи асосӣ",
            nfAvris: "Кушодани AvrisAI",
          },
        };
        var lang = "en";
        try {
          var stored = localStorage.getItem("hyperion-lang");
          if (stored && dict[stored]) lang = stored;
          else {
            var nav = (navigator.language || "").slice(0, 2).toLowerCase();
            if (dict[nav]) lang = nav;
          }
        } catch (e) {}
        if (lang !== "en") {
          document.documentElement.lang = lang;
          var d = dict[lang];
          document.querySelectorAll("[data-i18n]").forEach(function (node) {
            var key = node.dataset.i18n;
            if (d[key] !== undefined) node.textContent = d[key];
          });
        }
      })();
    </script>
  </body>
</html>
